<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم Baroud</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f2f5; text-align: right; }
        .form-container { background: white; padding: 20px; border-radius: 15px; max-width: 500px; margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #2ecc71; color: white; font-weight: bold; cursor: pointer; border: none; }
        .product-list { margin-top: 20px; }
        .item { background: white; padding: 10px; margin: 5px 0; display: flex; justify-content: space-between; border-radius: 5px; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>إضافة منتج جديد</h2>
    
    <label>الشركة:</label>
    <select id="op-select" onchange="updateCategories()">
        <option value="alfa">Alfa</option>
        <option value="touch">Touch</option>
    </select>

    <label>القسم:</label>
    <select id="cat-select">
        </select>

    <label>اسم المنتج (مثلاً: 1.5GB):</label>
    <input type="text" id="p-name" placeholder="أدخل الاسم">

    <label>السعر بالدولار:</label>
    <input type="number" step="0.01" id="p-price" placeholder="0.00">

    <button onclick="addProduct()">إضافة للمتجر 🚀</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://ttqvxahhxylkpioxzzfm.supabase.co';
    const SUPABASE_KEY = 'YOUR_ANON_KEY'; // حط الـ Key تبعك هون
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const cats = {
        alfa: ['Cards', 'Mobile Internet', 'U-Share Bundles'], // شلنا الـ Credit لأن حسبته خاصة
        touch: ['Cards', 'Validity', 'Mobile Internet']
    };

    function updateCategories() {
        const op = document.getElementById('op-select').value;
        const catSelect = document.getElementById('cat-select');
        catSelect.innerHTML = '';
        cats[op].forEach(c => {
            catSelect.innerHTML += `<option value="${c}">${c}</option>`;
        });
    }

    async function addProduct() {
        const op = document.getElementById('op-select').value;
        const cat = document.getElementById('cat-select').value;
        const name = document.getElementById('p-name').value;
        const price = document.getElementById('p-price').value;

        if(!name || !price) return alert("عبّي البيانات يا معلم!");

        const { error } = await _supabase
            .from('products')
            .insert([{ operator: op, category: cat, name: name, price_usd: price }]);

        if (error) {
            alert("صار خطأ: " + error.message);
        } else {
            alert("تمت الإضافة بنجاح!");
            document.getElementById('p-name').value = '';
            document.getElementById('p-price').value = '';
        }
    }

    updateCategories(); // لتعبئة أول قائمة عند الفتح
</script>
</body>
</html>
