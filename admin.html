<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم Baroud | إضافة منتجات</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; padding: 20px; text-align: right; }
        .form-container { background: white; padding: 25px; border-radius: 15px; max-width: 500px; margin: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        label { font-weight: bold; color: #555; display: block; margin-top: 15px; }
        input, select, button { width: 100%; padding: 12px; margin-top: 8px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        button { background: #2ecc71; color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 25px; transition: 0.3s; }
        button:hover { background: #27ae60; }
        .status { text-align: center; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>إضافة منتج جديد 🚀</h2>
    
    <label>الشركة:</label>
    <select id="op-select" onchange="updateCategories()">
        <option value="alfa">Alfa</option>
        <option value="touch">Touch</option>
    </select>

    <label>القسم:</label>
    <select id="cat-select"></select>

    <label>اسم المنتج (مثلاً: 1.5GB):</label>
    <input type="text" id="p-name" placeholder="أدخل الاسم">

    <label>السعر بالدولار ($):</label>
    <input type="number" step="0.01" id="p-price" placeholder="0.00">

    <label>رابط صورة المنتج (URL):</label>
    <input type="text" id="p-image" placeholder="ضع رابط الصورة هنا">

    <button id="add-btn" onclick="addProduct()">إضافة للمتجر ✅</button>
    <div id="status" class="status"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://ttqvxahhxylkpioxzzfm.supabase.co';
    const SUPABASE_KEY = 'EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0cXZ4eGFoeHlsa3Bpb3h6emZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNzY4MjMsImV4cCI6MjA5Mzc1MjgyM30.uxtuxKOEQFONbwqy8C6euI4f5V0mzhlb0GZ79Id03Lw';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const cats = {
        alfa: ['Cards', 'Mobile Internet', 'U-Share Bundles'],
        touch: ['Cards', 'Validity', 'Mobile Internet']
    };

    function updateCategories() {
        const op = document.getElementById('op-select').value;
        const catSelect = document.getElementById('cat-select');
        catSelect.innerHTML = '';
        cats[op].forEach(c => {
            catSelect.innerHTML += `<option value="${c}">${c}</option>`;
        });
    }

    async function addProduct() {
        const op = document.getElementById('op-select').value;
        const cat = document.getElementById('cat-select').value;
        const name = document.getElementById('p-name').value;
        const price = document.getElementById('p-price').value;
        const img = document.getElementById('p-image').value || 'https://via.placeholder.com/150';
        const btn = document.getElementById('add-btn');

        if(!name || !price) return alert("عبّي البيانات يا معلم!");

        btn.disabled = true;
        btn.innerText = "جاري الحفظ...";

        const { error } = await _supabase
            .from('products')
            .insert([{ operator: op, category: cat, name: name, price_usd: parseFloat(price), image_url: img }]);

        btn.disabled = false;
        btn.innerText = "إضافة للمتجر ✅";

        if (error) {
            document.getElementById('status').innerText = "خطأ: " + error.message;
        } else {
            document.getElementById('status').innerText = "تمت الإضافة بنجاح!";
            document.getElementById('p-name').value = '';
            document.getElementById('p-price').value = '';
            document.getElementById('p-image').value = '';
        }
    }
    updateCategories();
</script>
</body>
</html>
