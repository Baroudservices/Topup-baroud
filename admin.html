<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baroud Admin | لوحة التحكم</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 15px; text-align: right; margin: 0; }
        .form-container { background: white; padding: 20px; border-radius: 20px; max-width: 100%; box-shadow: 0 10px 25px rgba(0,0,0,0.1); box-sizing: border-box; }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-top: 15px; color: #555; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; background: #2ecc71; color: white; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 25px; font-size: 18px; }
        #status { text-align: center; margin-top: 15px; font-weight: bold; font-size: 14px; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>إضافة منتج جديد 🚀</h2>
    <label>الشركة:</label>
    <select id="op-select" onchange="updateCategories()">
        <option value="alfa">Alfa</option>
        <option value="touch">Touch</option>
    </select>

    <label>القسم:</label>
    <select id="cat-select"></select>

    <label>اسم المنتج:</label>
    <input type="text" id="p-name" placeholder="مثلاً: 10GB">

    <label>السعر بالدولار ($):</label>
    <input type="number" step="0.01" id="p-price" placeholder="0.00">

    <label>رابط الصورة (اختياري):</label>
    <input type="text" id="p-img" placeholder="https://image-link.com">

    <button id="submit-btn" onclick="addProduct()">إضافة للمتجر ✅</button>
    <div id="status"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://ttqvxahhxylkpioxzzfm.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0cXZ4eGFoeHlsa3Bpb3h6emZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNzY4MjMsImV4cCI6MjA5Mzc1MjgyM30.uxtuxKOEQFONbwqy8C6euI4f5V0mzhlb0GZ79Id03Lw';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const cats = { 
        alfa: ['Cards', 'Mobile Internet', 'U-Share Bundles'], 
        touch: ['Cards', 'Validity', 'Mobile Internet'] 
    };

    function updateCategories() {
        const op = document.getElementById('op-select').value;
        const sel = document.getElementById('cat-select');
        sel.innerHTML = '';
        cats[op].forEach(c => sel.innerHTML += `<option value="${c}">${c}</option>`);
    }

    async function addProduct() {
        const status = document.getElementById('status');
        const btn = document.getElementById('submit-btn');
        const name = document.getElementById('p-name').value;
        const price = document.getElementById('p-price').value;

        if(!name || !price) {
            status.innerText = "⚠️ يرجى تعبئة الخانات!";
            status.style.color = "orange";
            return;
        }

        btn.disabled = true;
        status.innerText = "⏳ جاري الإضافة...";
        status.style.color = "blue";

        try {
            const { error } = await _supabase.from('products').insert([{
                operator: document.getElementById('op-select').value,
                category: document.getElementById('cat-select').value,
                name: name,
                price_usd: parseFloat(price),
                image_url: document.getElementById('p-img').value || 'https://via.placeholder.com/150'
            }]);

            if (error) {
                status.innerText = "❌ خطأ قاعدة بيانات: " + error.message;
                status.style.color = "red";
            } else {
                status.innerText = "✅ تم بنجاح!";
                status.style.color = "green";
                document.getElementById('p-name').value = '';
                document.getElementById('p-price').value = '';
            }
        } catch (e) {
            status.innerText = "❌ فشل الاتصال: " + e.message;
            status.style.color = "red";
        } finally {
            btn.disabled = false;
        }
    }
    updateCategories();
</script>
</body>
</html>
