<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baroud Services</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; margin: 0; background: #0f0f0f; color: white; text-align: center; }
        .header { background: #1a1a1a; padding: 25px; font-size: 24px; font-weight: bold; border-bottom: 3px solid #2ecc71; }
        .container { padding: 15px; max-width: 600px; margin: auto; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .card { background: #1e1e1e; padding: 25px; border-radius: 20px; cursor: pointer; border: 1px solid #333; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: #555; }
        .alfa { color: #E30613; border-bottom: 4px solid #E30613; }
        .touch { color: #00A1E4; border-bottom: 4px solid #00A1E4; }
        .btn-back { background: #333; color: #ccc; border: 1px solid #444; padding: 10px; border-radius: 12px; width: 100%; margin-bottom: 20px; cursor: pointer; }
        /* كرت المنتج الجديد */
        .product-card { background: #1e1e1e; border-radius: 15px; overflow: hidden; border: 1px solid #2a2a2a; display: flex; flex-direction: column; text-align: right; }
        .product-img { width: 100%; height: 110px; object-fit: cover; background: #252525; }
        .p-info { padding: 12px; }
        .p-price { color: #2ecc71; font-size: 20px; font-weight: bold; margin: 5px 0; }
        .order-btn { background: #2ecc71; color: white; border: none; width: 100%; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="header">BAROUD SERVICES</div>
<div id="main-menu" class="container">
    <div class="grid">
        <div class="card alfa" onclick="showSubMenu('alfa')">ALFA</div>
        <div class="card touch" onclick="showSubMenu('touch')">TOUCH</div>
    </div>
</div>

<div id="sub-menu" class="container hidden">
    <button class="btn-back" onclick="goBack()">← العودة</button>
    <div id="sections-list" class="grid"></div>
    <div id="products-list" class="grid" style="grid-template-columns: 1fr 1fr;"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://ttqvxahhxylkpioxzzfm.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0cXZ4eGFoeHlsa3Bpb3h6emZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNzY4MjMsImV4cCI6MjA5Mzc1MjgyM30.uxtuxKOEQFONbwqy8C6euI4f5V0mzhlb0GZ79Id03Lw';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let currentOp = '';

    function showSubMenu(op) {
        currentOp = op;
        document.getElementById('main-menu').classList.add('hidden');
        document.getElementById('sub-menu').classList.remove('hidden');
        renderSections(op);
    }

    function renderSections(op) {
        const list = document.getElementById('sections-list');
        const pList = document.getElementById('products-list');
        list.innerHTML = ''; pList.innerHTML = ''; list.classList.remove('hidden');
        const cats = op === 'alfa' ? ['Cards', 'Mobile Internet', 'U-Share Bundles'] : ['Cards', 'Validity', 'Mobile Internet'];
        cats.forEach(c => {
            const d = document.createElement('div');
            d.className = 'card'; d.innerText = c;
            d.onclick = () => fetchProducts(c);
            list.appendChild(d);
        });
    }

    async function fetchProducts(cat) {
        document.getElementById('sections-list').classList.add('hidden');
        const { data } = await _supabase.from('products').select('*').eq('operator', currentOp).eq('category', cat);
        const pList = document.getElementById('products-list');
        pList.innerHTML = '';
        data.forEach(p => {
            pList.innerHTML += `
                <div class="product-card">
                    <img src="${p.image_url}" class="product-img">
                    <div class="p-info">
                        <div style="font-weight:bold; font-size:14px;">${p.name}</div>
                        <div class="p-price">$${p.price_usd}</div>
                        <button class="order-btn" onclick="order('${p.name}', '${p.price_usd}')">طلب</button>
                    </div>
                </div>`;
        });
    }

    function goBack() {
        if (document.getElementById('sections-list').classList.contains('hidden')) renderSections(currentOp);
        else { document.getElementById('sub-menu').classList.add('hidden'); document.getElementById('main-menu').classList.remove('hidden'); }
    }

    function order(n, p) {
        window.open(`https://wa.me/96170000000?text=${encodeURIComponent('طلب: ' + n + ' بـ $' + p)}`, '_blank');
    }
</script>
</body>
</html>
