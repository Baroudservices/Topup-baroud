<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baroud Services | بارود للخدمات</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --alfa-red: #E30613;
            --touch-blue: #00A1E4;
            --bg-dark: #0f0f0f;
            --card-dark: #1a1a1a;
            --text-gold: #f1c40f;
            --success: #2ecc71;
        }

        body { 
            font-family: 'Tajawal', sans-serif; 
            margin: 0; 
            background-color: var(--bg-dark); 
            color: white; 
            text-align: center;
        }

        /* رأس الصفحة المطور */
        .header { 
            background: linear-gradient(145deg, #1d1d1d, #000); 
            padding: 30px; 
            font-size: 24px; 
            font-weight: bold; 
            border-bottom: 2px solid var(--success);
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            letter-spacing: 1px;
        }

        .container { padding: 20px; max-width: 500px; margin: auto; }

        /* تنسيق الشبكة */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }

        /* الكروت الأساسية */
        .card { 
            background: var(--card-dark); 
            padding: 25px 15px; 
            border-radius: 20px; 
            cursor: pointer; 
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            border: 1px solid #333;
            position: relative;
            overflow: hidden;
        }

        .card:hover { transform: translateY(-5px); border-color: #555; }
        .card:active { transform: scale(0.95); }

        .alfa { border-bottom: 5px solid var(--alfa-red); color: var(--alfa-red); }
        .touch { border-bottom: 5px solid var(--touch-blue); color: var(--touch-blue); }

        /* زر العودة */
        .btn-back { 
            background: #222; 
            color: #bbb; 
            border: 1px solid #444; 
            padding: 12px; 
            border-radius: 12px; 
            margin-bottom: 20px; 
            cursor: pointer; 
            width: 100%; 
            font-size: 16px;
            font-weight: bold;
        }

        /* كرت المنتج الجديد */
        .product-card {
            background: var(--card-dark);
            border-radius: 18px;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            border: 1px solid #2a2a2a;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            text-align: right;
        }

        .product-header {
            background: #252525;
            padding: 15px;
            border-radius: 18px 18px 0 0;
            font-weight: bold;
            font-size: 17px;
            border-bottom: 1px solid #333;
        }

        .product-body {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .p-price { color: var(--success); font-size: 22px; font-weight: bold; }
        
        .order-btn { 
            background: var(--success); 
            color: white; 
            border: none; 
            padding: 10px 25px; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.2);
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="header">BAROUD SERVICES</div>

<div id="main-menu" class="container">
    <h3 style="color: #888; margin-bottom: 25px;">اختر شبكة الاتصال</h3>
    <div class="grid">
        <div class="card alfa" onclick="showSubMenu('alfa')">
            <div style="font-size: 14px; opacity: 0.7;">الخدمة</div>
            <strong>ALFA</strong>
        </div>
        <div class="card touch" onclick="showSubMenu('touch')">
            <div style="font-size: 14px; opacity: 0.7;">الخدمة</div>
            <strong>TOUCH</strong>
        </div>
    </div>
</div>

<div id="sub-menu" class="container hidden">
    <button class="btn-back" onclick="goBack()">← العودة للرئيسية</button>
    <h3 id="menu-title" style="margin-bottom: 20px; color: #f1c40f;"></h3>
    <div id="sections-list" class="grid"></div>
    <div id="products-list" style="margin-top: 10px;"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://ttqvxahhxylkpioxzzfm.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0cXZ4eGFoeHlsa3Bpb3h6emZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNzY4MjMsImV4cCI6MjA5Mzc1MjgyM30.uxtuxKOEQFONbwqy8C6euI4f5V0mzhlb0GZ79Id03Lw';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentOperator = '';

    function showSubMenu(op) {
        currentOperator = op;
        document.getElementById('main-menu').classList.add('hidden');
        document.getElementById('sub-menu').classList.remove('hidden');
        document.getElementById('menu-title').innerText = "خدمات " + op.toUpperCase();
        renderSections(op);
    }

    function renderSections(op) {
        const list = document.getElementById('sections-list');
        const pList = document.getElementById('products-list');
        list.innerHTML = ''; pList.innerHTML = '';
        list.classList.remove('hidden');

        const cats = op === 'alfa' ? ['Cards', 'Mobile Internet', 'U-Share Bundles'] : ['Cards', 'Validity', 'Mobile Internet'];

        cats.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.style.padding = "20px 10px";
            card.innerText = item;
            card.onclick = () => fetchProducts(item);
            list.appendChild(card);
        });
    }

    async function fetchProducts(category) {
        document.getElementById('menu-title').innerText = category;
        document.getElementById('sections-list').classList.add('hidden');
        const pList = document.getElementById('products-list');
        pList.innerHTML = '<p style="color: #666;">جاري تحميل العروض...</p>';

        const { data, error } = await _supabase.from('products').select('*').eq('operator', currentOperator).eq('category', category);

        pList.innerHTML = '';
        if (error || !data.length) {
            pList.innerHTML = '<p>لا يوجد عروض حالياً.</p>';
            return;
        }

        data.forEach(p => {
            pList.innerHTML += `
                <div class="product-card">
                    <div class="product-header">${p.name}</div>
                    <div class="product-body">
                        <div class="p-price">$${parseFloat(p.price_usd).toFixed(2)}</div>
                        <button class="order-btn" onclick="order('${p.name}', '${p.price_usd}')">طلب الآن</button>
                    </div>
                </div>`;
        });
    }

    function goBack() {
        if (document.getElementById('sections-list').classList.contains('hidden')) {
            renderSections(currentOperator);
            document.getElementById('menu-title').innerText = "خدمات " + currentOperator.toUpperCase();
        } else {
            document.getElementById('sub-menu').classList.add('hidden');
            document.getElementById('main-menu').classList.remove('hidden');
        }
    }

    function order(name, price) {
        const phone = "96170000000"; // حط رقمك هون
        const msg = encodeURIComponent(`مرحباً، أريد طلب:\nالخدمة: ${name}\nالسعر: $${price}`);
        window.open(`https://wa.me/${phone}?text=${msg}`, '_blank');
    }
</script>
</body>
</html>
